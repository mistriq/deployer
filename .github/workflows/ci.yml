name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOVULNCHECK_VERSION: v1.3.0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Format check
        run: test -z "$(gofmt -l *.go)"

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o /tmp/deployer-ci .

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION} ./...
